apis:
  - aid: fluidstack:fluidstack-management-api
    name: Fluidstack Management API
    description: >-
      The global Fluidstack Management API (v1alpha1) for managing GPU cloud
      resources. Exposes regions, clusters, organizations, members,
      invitations, instances, and user SSH keys. Uses bearer token
      authentication, optional X-PROJECT-ID header scoping for instance
      listings, and is served from https://api.atlas.fluidstack.io/api/v1alpha1.
    humanURL: https://docs.fluidstack.io/api-reference/management-api
