aid: fluidstack
name: Fluidstack
description: >-
  Fluidstack is an AI cloud platform that builds and operates high-performance,
  single-tenant GPU clusters for top AI labs, governments, and enterprises.
  Founded in 2017 out of Oxford University and now headquartered in New York
  City, Fluidstack manages more than 100,000 GPUs across its global network and
  has been selected by customers including Anthropic, Meta, Mistral, Poolside,
  Black Forest Labs, and Character.AI. Its core offering combines on-demand
  bare-metal GPU clusters (including thousands of NVIDIA H200s with InfiniBand)
  with managed Kubernetes and managed Slurm orchestration layers, Lighthouse
  observability, and human-on-call site reliability. Fluidstack exposes a
  global REST Management API (api.atlas.fluidstack.io/api/v1alpha1) and the
  fluidctl CLI for managing organizations, projects, regions, clusters,
  instances, members, invitations, and SSH keys. The platform is GDPR, SOC 2
  Type 2, and ISO 27001 certified, and was awarded ClusterMAX Gold by
  SemiAnalysis.
